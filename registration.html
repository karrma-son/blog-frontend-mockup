<!DOCTYPE html>
<html lang="en" >
<head>
    <link rel="stylesheet" href="arcade_style.css">
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera_front" />
    <title>Registration</title>
</head>


<body class="fade" id="registration-page">

    <h3>Sign up for free access</h3>
    <!-- <h3> to the best news about modern culture</h3> -->
    <form class="registration-form fade" action="/registration-page" method="post">
        <div class="registration">
            <div class="user-input">

                 <div class="input-container">
                    <label for="first-name"></label>
                        <input type="text" title="first-name"placeholder="First Name">
                    <label for="last-name"></label>
                        <input type="text" title="last-name"placeholder="Last Name" >
                    
                    <p></p>

                    <label for="username"></label>
                        <input type="text" title="user-name"placeholder="Username">
                   <label for="email"></label>
                        <input type="text" title="email" placeholder="Email">
                </div>
                    <p></p>
                        
                <div class="input-container">
                    <label for="password"></label>
                        <input type="text" title="enter-password" placeholder="Password">
                    <label for="password-reenter"></label>
                        <input type="text" title="reenter-password" placeholder="Re-enter password" aria-placeholder="Passwords must match">
                </div>
                  
                            
                <button class="login-btn2" id="submit-btn" class="submit-btn" type="submit">Sign Up</button>
          
            </div>
              <div class="right-box"> 
                  <h2 class="interest-headline">Upload Avatar</h2>
                <div class="image-box" >
                    <label for="file-path">
                        <img id="registration-img" class="registration-img" src="images/user-avatar-var.jpg" alt="user-avatar">
                    </label>
                </div>
                    <!-- <span class="material-symbols-outlined">
                        photo_camera_front
                    </span>
                    optional -->
                  
                    <p>(optional)</p>
                <input type="file" accept="image/jpeg, image/png, image/jpg" id="file-path">
                
            </div>
        </div>

    </form> 

        <div class="registration-login">
            <p>Already have an account?</p>
            <a href="login.html"><p>Click here to login</p> </a>
        </div> 
      
 <script src="main.js"> </script>   
</body>
</html>
