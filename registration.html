<!DOCTYPE html>
<html lang="en" >
<head>
    <link rel="stylesheet" href="arcade_style.css">
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera_front" />
    <title>Registration</title>
</head>


<body class="fade" id="registration-page">

    <h3>Join the young based blog community</h3>
    <!-- <h3> to the best news about modern culture</h3> -->
    <form class="registration-form fade" action="/registration-page" method="post">
        <div class="registration">
            <div class="registration-row">
                <div class="user-input">

                    <div class="input-container">
                        <label for="first-name">First Name</label>
                            <input type="text" title="first-name" aria-placeholder="Please enter your first name">
                        <label for="last-name">Last Name</label>
                            <input type="text" title="last-name" aria-placeholder="Please enter your last name" >


                        <label for="username"> Username</label>
                            <input type="text" title="user-name" aria-placeholder="Please enter a username">
                        <label for="email">Email</label>
                            <input type="text" title="email" aria-placeholder="Please enter an email address">
                
                    
                        <label for="password">Password</label>
                            <input type="password" title="enter-password" aria-placeholder="Please enter a password">
                        <label for="password-reenter">Re-enter Password</label>
                            <input type="password" title="reenter-password" aria-placeholder="Please re-enter your password">
                    </div>
                  
                   
                </div>
                <div class="right-box"> 
                    <h2>Upload Avatar</h2>
                    <div class="image-box" >
                        <label for="file-path">
                            <img id="registration-img" class="registration-img" src="images/user-avatar-var.jpg" alt="user-avatar">
                        </label>
                    </div>
                        <!-- <span class="material-symbols-outlined">
                            photo_camera_front
                        </span>
                        optional -->
                    
                        <p>(optional)</p>
                    <input type="file" accept="image/jpeg, image/png, image/jpg" id="file-path">
                    
                </div>
            </div>    
            <div class="registration-login">
                 <button id="signup-btn" class="submit-btn" type="submit">Sign Up</button>
            
                <p>Already have an account?</p>
                <a href="login.html"><p>Click here to login</p> </a>
            </div> 
        </div>
     
    </form> 

 
      
 <script src="main.js"> </script>   
</body>
</html>
